<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教師兼代課鐘點費計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .week-checkbox:checked + label {
            background-color: #ffffff;
            color: #2563eb; 
            border: 2px solid #3b82f6; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        input[type="number"] {
            appearance: textfield;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* 避免日期選擇器在部分手機瀏覽器縮放 */
        input[type="date"] {
            font-size: 16px;
        }
    </style>
</head>
<body class="antialiased text-slate-900 pb-12">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 sm:pt-10">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight">
                教師兼代課鐘點費計算器
            </h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:items-start">
            
            <!-- 左側設定區 -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- 學期基準 - 修正框線貼邊問題 -->
                <div class="glass-card p-5 sm:p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                    <h3 class="flex items-center font-bold text-slate-800 mb-4 text-base sm:text-lg">
                        <span class="w-8 h-8 flex items-center justify-center bg-orange-100 text-orange-600 rounded-lg mr-3">📅</span>
                        學期時間基準
                    </h3>
                    <div class="flex flex-col sm:flex-row gap-4 px-1">
                        <div class="w-full sm:flex-1">
                            <label class="block text-[11px] font-black text-slate-400 mb-1.5 ml-1 uppercase tracking-wider">第一週前的週日</label>
                            <input type="date" id="semesterStartDate" onchange="renderWeekCheckboxes()" class="w-full h-12 px-6 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                        </div>
                        <div class="w-full sm:w-auto sm:mt-6">
                            <button onclick="autoSetSemester()" class="w-full h-12 px-6 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl transition-all shadow-md active:scale-95 text-sm whitespace-nowrap">
                                建議日期
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 職務與節數設定 -->
                <div class="glass-card p-5 sm:p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <h3 class="flex items-center font-bold text-slate-800 mb-6 text-base sm:text-lg">
                        <span class="w-8 h-8 flex items-center justify-center bg-blue-100 text-blue-600 rounded-lg mr-3">👔</span>
                        職務與節數設定
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="flex items-center justify-between gap-2 py-3 border-b border-slate-100 px-1">
                            <div>
                                <p class="font-bold text-slate-700 text-sm">全校總班級數</p>
                                <p id="scaleLabel" class="text-[10px] text-blue-500 font-medium italic">判定中...</p>
                            </div>
                            <div class="flex items-center">
                                <input type="number" id="classCount" value="25" min="1" oninput="handleClassCountChange()" class="w-20 h-10 text-center bg-blue-50 text-blue-700 font-black rounded-lg border-none focus:ring-2 focus:ring-blue-400">
                                <span class="ml-2 text-sm text-slate-400 font-bold">班</span>
                            </div>
                        </div>

                        <div class="space-y-1 px-1">
                            <label class="text-xs font-bold text-slate-400 ml-1">教師基本身分</label>
                            <select id="subject" onchange="updateWeekCalculations()" class="w-full h-11 px-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium">
                                <option value="16">一般教師 (基本 16 節)</option>
                                <option value="14">國文教師 (基本 14 節)</option>
                            </select>
                        </div>

                        <div class="space-y-1 px-1">
                            <label class="text-xs font-bold text-slate-400 ml-1">行政職務類型</label>
                            <select id="adminType" onchange="handleAdminTypeChange()" class="w-full h-11 px-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium">
                                <option value="none">無行政職務</option>
                                <option value="boss">副校長 / 秘書 / 一級主任</option>
                                <option value="subBoss">進修部主任 / 分部主任</option>
                                <option value="groupCore">組長 (教/註/訓/生/衛)</option>
                                <option value="groupOther">其餘二級單位組長</option>
                                <option value="groupSub">進修部組長</option>
                                <option value="deptHead">各科、學程主任</option>
                                <option value="assistant">協助行政教師 (彈性)</option>
                            </select>
                        </div>

                        <div id="assistantConfig" class="hidden bg-amber-50 p-4 rounded-xl border border-amber-100 mx-1">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold text-amber-700">協助行政減授節數</span>
                                <div class="flex items-center">
                                    <input type="number" id="customReduction" value="2" min="0" oninput="updateWeekCalculations()" class="w-16 h-8 text-center bg-white rounded border border-amber-200 text-amber-800 font-bold">
                                    <span class="ml-2 text-xs text-amber-600">節</span>
                                </div>
                            </div>
                        </div>

                        <div id="deptHeadConfig" class="hidden bg-indigo-50 p-4 rounded-xl border border-indigo-100 mx-1">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold text-indigo-700">該科/學程班級數</span>
                                <div class="flex items-center">
                                    <input type="number" id="deptClassCount" value="3" min="1" oninput="updateWeekCalculations()" class="w-16 h-8 text-center bg-white rounded border border-indigo-200 text-indigo-800 font-bold">
                                    <span class="ml-2 text-xs text-indigo-600">班</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between py-3 bg-slate-50 px-4 rounded-xl mx-1">
                            <span class="text-xs font-black text-slate-500 uppercase">減授後基本節數</span>
                            <div class="flex items-baseline">
                                <span id="legalBaseDisplay" class="text-2xl font-black text-blue-600">--</span>
                                <span class="ml-1 text-[10px] text-slate-400">節 / 週</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-3 border-2 border-dashed border-slate-100 rounded-xl mx-1">
                            <label for="isTutor" class="text-sm font-bold text-slate-700 cursor-pointer">兼任班導師 (減 4 節)</label>
                            <input type="checkbox" id="isTutor" onchange="updateWeekCalculations()" class="w-6 h-6 text-blue-600 rounded-lg cursor-pointer">
                        </div>

                        <div class="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm mx-1">
                            <div class="flex items-center justify-between mb-3">
                                <div>
                                    <p class="text-sm font-bold text-slate-700 leading-tight">每週固定超鐘點</p>
                                    <p class="text-[10px] text-slate-400 font-medium tracking-tight">固定排課部分</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="weeklyExtra" value="0" min="0" oninput="updateWeekCalculations()" class="w-20 h-12 bg-slate-50 rounded-xl border border-slate-100 text-center font-black text-xl text-blue-600 focus:ring-2 focus:ring-blue-400 outline-none">
                                    <span class="font-bold text-slate-400 text-xs">節/週</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 教學週次 -->
                <div class="glass-card p-5 sm:p-6 rounded-2xl shadow-sm border-l-4 border-indigo-500">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3 px-1">
                        <h3 class="font-bold text-slate-800 text-base sm:text-lg flex items-center">
                            <span class="w-8 h-8 flex items-center justify-center bg-indigo-100 text-indigo-600 rounded-lg mr-3">🗓️</span>
                            教學週次
                        </h3>
                        <div class="flex items-center gap-2">
                            <span id="weekCountBadge" class="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-black shrink-0">0 週</span>
                            <select id="monthSelector" onchange="renderWeekCheckboxes()" class="bg-slate-100 border-none rounded-xl text-xs font-black px-4 h-10 outline-none focus:ring-2 focus:ring-indigo-400 min-w-[120px]"></select>
                        </div>
                    </div>

                    <div id="weekContainer" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8 px-1">
                        <!-- 動態生成 -->
                    </div>

                    <div class="space-y-4 px-1">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="p-4 bg-slate-100 rounded-2xl border border-slate-200">
                                <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-wider">本月基本授課節數</label>
                                <div class="flex items-baseline gap-2">
                                    <span id="displayMonthBase" class="text-2xl font-black text-slate-700">0</span>
                                    <span class="text-xs font-bold text-slate-400">節</span>
                                </div>
                            </div>
                            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                <label class="block text-[10px] font-black text-blue-400 mb-1 uppercase tracking-wider">本月固定超時節數</label>
                                <div class="flex items-baseline gap-2">
                                    <span id="displayMonthExtra" class="text-2xl font-black text-blue-600">0</span>
                                    <span class="text-xs font-bold text-blue-400">節</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                <label class="block text-[10px] font-black text-slate-400 mb-1">自行支應 (事/病)</label>
                                <input type="number" id="selfPayHours" value="0" min="0" class="w-full bg-transparent border-none p-0 font-bold text-slate-600 outline-none text-lg">
                            </div>
                            <div class="p-3 bg-red-50 rounded-xl border border-red-100">
                                <label class="block text-[10px] font-black text-red-400 mb-1">學校支應 (扣除)</label>
                                <input type="number" id="schoolPayHours" value="0" min="0" class="w-full bg-transparent border-none p-0 font-bold text-red-600 outline-none text-lg">
                            </div>
                            <div class="p-3 bg-green-50 rounded-xl border border-green-100">
                                <label class="block text-[10px] font-black text-green-400 mb-1">協助代課 (所得)</label>
                                <input type="number" id="supportPayHours" value="0" min="0" class="w-full bg-transparent border-none p-0 font-bold text-green-600 outline-none text-lg">
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full h-16 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-2xl shadow-xl transition-all active:scale-95">
                    立即結算報表
                </button>
            </div>

            <!-- 右側結果區 -->
            <div class="lg:col-span-5 lg:sticky lg:top-6">
                <div class="glass-card rounded-3xl shadow-2xl border-t-[10px] border-blue-600 overflow-hidden bg-white">
                    <div class="p-6 sm:p-8">
                        <h2 class="text-xl font-black text-slate-800 mb-8 text-center">📋 結算結果分析</h2>
                        
                        <div id="resultPlaceholder" class="py-20 text-center space-y-4">
                            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-2xl">⏳</div>
                            <p class="text-sm font-bold text-slate-300">請填寫資料後計算</p>
                        </div>

                        <div id="resultContent" class="hidden space-y-6">
                            <div class="space-y-4">
                                <div class="flex justify-between items-center text-sm px-1">
                                    <span class="text-slate-500 font-bold">基本授課門檻</span>
                                    <span id="resBaseTotal" class="font-black text-slate-700">--</span>
                                </div>
                                <div class="flex justify-between items-center text-sm px-1">
                                    <span class="text-blue-500 font-bold">本月超鐘點結算</span>
                                    <span id="resExtraHours" class="font-black text-blue-600">--</span>
                                </div>
                                <div class="flex justify-between items-center text-sm px-1">
                                    <span class="text-green-600 font-bold">代課鐘點所得</span>
                                    <span id="resSupportHours" class="font-black text-green-600">--</span>
                                </div>
                                <div class="flex justify-between items-center text-sm px-1">
                                    <span class="text-red-500 font-bold">學校支應 (扣除)</span>
                                    <span id="resSchoolHours" class="font-black text-red-600">--</span>
                                </div>
                                <div class="flex justify-between items-center text-sm px-1 border-b border-slate-50 pb-2">
                                    <span class="text-slate-400 font-bold">自行支應 (不計薪)</span>
                                    <span id="resSelfHours" class="font-black text-slate-400">--</span>
                                </div>
                                
                                <div class="flex justify-between items-center py-4 bg-blue-50 px-4 rounded-2xl border border-blue-100">
                                    <span class="text-slate-700 font-black text-sm">結算合計總節數</span>
                                    <span id="resFinalTotalHours" class="text-2xl font-black text-blue-800">0 節</span>
                                </div>
                            </div>

                            <div class="bg-white p-8 rounded-[2.5rem] text-center border-2 border-blue-600 shadow-xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
                                <p class="text-[10px] text-blue-500 font-black mb-2 tracking-widest uppercase">Estimate Monthly Income</p>
                                <p id="resTotalIncome" class="text-5xl font-black text-blue-700 tracking-tighter">$0</p>
                                <div class="w-12 h-1 bg-blue-100 mx-auto mt-4 rounded-full"></div>
                                <p class="text-[10px] text-slate-400 mt-4 font-medium italic">依現行單價 $505 計算</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const RATE = 505;
        const LEGAL_DATA = {
            boss:       [7, 5, 3, 1, 1, 0, 0, 0],
            subBoss:    [5, 3, 1, 0, 0, 0, 0, 0],
            groupCore:  [8, 8, 6, 5, 3, 1, 0, 0],
            groupOther: [9, 9, 7, 7, 5, 3, 1, 0],
            groupSub:   [6, 6, 4, 3, 1, 0, 0, 0]
        };

        window.onload = function() {
            autoSetSemester();
            initMonthSelector();
            handleClassCountChange();
        };

        function handleClassCountChange() {
            const count = parseInt(document.getElementById('classCount').value) || 0;
            const label = document.getElementById('scaleLabel');
            let idx = 0;
            if (count <= 9) { label.innerText = "9 班以下"; idx = 0; }
            else if (count <= 18) { label.innerText = "10 - 18 班"; idx = 1; }
            else if (count <= 24) { label.innerText = "19 - 24 班"; idx = 2; }
            else if (count <= 30) { label.innerText = "25 - 30 班"; idx = 3; }
            else if (count <= 36) { label.innerText = "31 - 36 班"; idx = 4; }
            else if (count <= 48) { label.innerText = "37 - 48 班"; idx = 5; }
            else if (count <= 60) { label.innerText = "49 - 60 班"; idx = 6; }
            else { label.innerText = "61 班以上"; idx = 7; }
            window.currentScaleIdx = idx;
            updateWeekCalculations();
        }

        function handleAdminTypeChange() {
            const type = document.getElementById('adminType').value;
            document.getElementById('deptHeadConfig').classList.toggle('hidden', type !== 'deptHead');
            document.getElementById('assistantConfig').classList.toggle('hidden', type !== 'assistant');
            updateWeekCalculations();
        }

        function getLegalBase() {
            const type = document.getElementById('adminType').value;
            const teacherBase = parseInt(document.getElementById('subject').value);
            const idx = window.currentScaleIdx || 0;
            if (type === 'none') return teacherBase;
            if (type === 'assistant') {
                const reduction = parseInt(document.getElementById('customReduction').value) || 0;
                return Math.max(0, teacherBase - reduction);
            }
            if (type === 'deptHead') {
                const deptCount = parseInt(document.getElementById('deptClassCount').value) || 0;
                if (deptCount <= 3) return 8;
                if (deptCount <= 6) return 7;
                return 6;
            }
            return LEGAL_DATA[type][idx];
        }

        function updateWeekCalculations() {
            const base = getLegalBase();
            const isTutor = document.getElementById('isTutor').checked;
            const weeklyExtra = parseInt(document.getElementById('weeklyExtra').value) || 0;
            let finalBase = isTutor ? Math.max(0, base - 4) : base;
            document.getElementById('legalBaseDisplay').innerText = finalBase;
            
            let checkedWeeks = 0;
            document.querySelectorAll('.week-checkbox').forEach(cb => { if (cb.checked) checkedWeeks++; });
            
            const monthBaseTotal = finalBase * checkedWeeks;
            const monthExtraTotal = weeklyExtra * checkedWeeks;
            
            document.getElementById('displayMonthBase').innerText = monthBaseTotal;
            document.getElementById('displayMonthExtra').innerText = monthExtraTotal;
            document.getElementById('weekCountBadge').innerText = `${checkedWeeks} 週`;
        }

        function autoSetSemester() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const year = today.getFullYear();
            let target = (month >= 8 || month === 1) ? `${(month === 1 ? year - 1 : year)}-08-31` : `${year}-02-08`;
            document.getElementById('semesterStartDate').value = target;
            renderWeekCheckboxes();
        }

        function initMonthSelector() {
            const s = document.getElementById('monthSelector');
            const now = new Date();
            for (let i = -3; i <= 6; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
                const opt = document.createElement('option');
                opt.value = `${d.getFullYear()}-${d.getMonth() + 1}`;
                opt.innerText = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
                if (i === 0) opt.selected = true;
                s.appendChild(opt);
            }
        }

        function renderWeekCheckboxes() {
            const startStr = document.getElementById('semesterStartDate').value;
            if (!startStr) return;
            const semSun = new Date(startStr);
            const [y, m] = document.getElementById('monthSelector').value.split('-').map(Number);
            const container = document.getElementById('weekContainer');
            container.innerHTML = '';
            const first = new Date(y, m - 1, 1);
            const last = new Date(y, m, 0);
            let curr = new Date(first);
            curr.setDate(curr.getDate() - curr.getDay());
            while (curr <= last) {
                const sun = new Date(curr);
                const sat = new Date(curr);
                sat.setDate(sun.getDate() + 6);
                if (sat >= first && sun <= last) {
                    const diff = Math.round((sun - semSun) / 86400000);
                    const weekNum = Math.ceil((diff + 1) / 7);
                    if (weekNum > 0) {
                        const div = document.createElement('div');
                        div.innerHTML = `
                            <input type="checkbox" id="w${weekNum}" checked class="hidden week-checkbox" onchange="updateWeekCalculations()">
                            <label for="w${weekNum}" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-xl cursor-pointer bg-white shadow-sm h-full text-center">
                                <span class="text-[13px] font-black text-slate-800">第 ${weekNum} 週</span>
                                <div class="text-[9px] text-slate-400 mt-1 week-date">${sun.getMonth()+1}/${sun.getDate()}-${sat.getDate()}</div>
                            </label>
                        `;
                        container.appendChild(div);
                    }
                }
                curr.setDate(curr.getDate() + 7);
            }
            updateWeekCalculations();
        }

        function calculate() {
            const finalBasePerWeek = parseInt(document.getElementById('legalBaseDisplay').innerText);
            const weeklyExtra = parseInt(document.getElementById('weeklyExtra').value) || 0;
            const supportHours = parseInt(document.getElementById('supportPayHours').value) || 0;
            const schoolPayHours = parseInt(document.getElementById('schoolPayHours').value) || 0;
            const selfPayHours = parseInt(document.getElementById('selfPayHours').value) || 0;
            
            let checkedWeeks = 0;
            document.querySelectorAll('.week-checkbox').forEach(cb => { if (cb.checked) checkedWeeks++; });
            
            const monthBaseRequired = finalBasePerWeek * checkedWeeks;
            const extraHoursTotal = weeklyExtra * checkedWeeks;
            const finalNetHours = extraHoursTotal + supportHours - schoolPayHours;

            document.getElementById('resultPlaceholder').classList.add('hidden');
            document.getElementById('resultContent').classList.remove('hidden');
            
            document.getElementById('resBaseTotal').innerText = `${monthBaseRequired} 節`;
            document.getElementById('resExtraHours').innerText = `${extraHoursTotal} 節`;
            document.getElementById('resSupportHours').innerText = `+${supportHours} 節`;
            document.getElementById('resSchoolHours').innerText = `-${schoolPayHours} 節`;
            document.getElementById('resSelfHours').innerText = `${selfPayHours} 節`;
            
            document.getElementById('resFinalTotalHours').innerText = `${finalNetHours} 節`;
            document.getElementById('resTotalIncome').innerText = '$' + Math.round(finalNetHours * RATE).toLocaleString();
            
            if (window.innerWidth < 1024) {
                document.getElementById('resultContent').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
